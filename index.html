<!DOCTYPE html>
<html>
<head>
  <title>Eternal chat</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #121212;
      color: white;
      text-align: center;
    }

    h2 {
      margin: 10px;
    }

    #login {
      margin-top: 50px;
    }

    input {
      padding: 10px;
      margin: 5px;
      border-radius: 5px;
      border: none;
      outline: none;
    }

    button {
      padding: 10px 15px;
      border: none;
      border-radius: 5px;
      background: #25D366;
      color: white;
      cursor: pointer;
    }

    #chatUI {
      display: flex;
      flex-direction: column;
      height: 90vh;
    }

    #chat {
      flex: 1;
      overflow-y: scroll;
      padding: 10px;
      display: flex;
      flex-direction: column;
    }

    .msg {
      max-width: 70%;
      padding: 10px 14px;
      margin: 6px;
      border-radius: 15px;
      position: relative;
      word-wrap: break-word;
      font-size: 14px;
    }

    .left {
      background: #2a2a2a;
      align-self: flex-start;
      border-bottom-left-radius: 5px;
    }

    .right {
      background: #25D366;
      color: black;
      align-self: flex-end;
      border-bottom-right-radius: 5px;
    }

    .username {
      font-size: 11px;
      opacity: 0.7;
    }

    #inputArea {
      display: flex;
      padding: 10px;
      background: #1e1e1e;
    }

    #message {
      flex: 1;
      padding: 10px;
      border-radius: 20px;
      border: none;
      outline: none;
      background: #25D366;
      color: black;
    }

    #sendBtn {
      margin-left: 10px;
      border-radius: 50%;
      padding: 10px 15px;
      background: #25D366;
    }
  </style>
</head>

<body>

<h2>💬 Live Chat</h2>

<div id="login">
  <input id="username" placeholder="Enter username">
  <button onclick="joinChat()">Join</button>
</div>

<div id="chatUI" style="display:none;">
  <div id="chat"></div>

  <div id="inputArea">
    <input id="message" placeholder="Type a message">
    <button id="sendBtn" onclick="sendMessage()">➤</button>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
  // 🔥 PASTE YOUR FIREBASE CONFIG HERE
  const firebaseConfig = {
    apiKey: "AIzaSyDtJCmbRWM-kjCXOd11h0LPVhluENTlND0",
    authDomain: "eternal-chat-92d58.firebaseapp.com",
    databaseURL:"https://eternal-chat-92d58-default-rtdb.firebaseio.com/",
    projectId: "eternal-chat-92d58",
    storageBucket: "eternal-chat-92d58.firebasestorage.app",
    messagingSenderId: "21836659124",
    appId: "1:21836659124:web:0494b5721d5dfee0021ae1"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  let username = "";

  function joinChat() {
    username = document.getElementById("username").value;
    if (!username) return alert("Enter username");

    document.getElementById("login").style.display = "none";
    document.getElementById("chatUI").style.display = "flex";

    loadMessages();
  }

  function sendMessage() {
    const msg = document.getElementById("message").value;
    if (!msg.trim()) return;

    db.ref("messages").push({
      user: username,
      text: msg
    });

    document.getElementById("message").value = "";
  }

  function loadMessages() {
    db.ref("messages").on("child_added", snapshot => {
      const data = snapshot.val();
      const chat = document.getElementById("chat");

      const msgDiv = document.createElement("div");

      if (data.user === username) {
        msgDiv.className = "msg right";
        msgDiv.innerHTML = `${data.text}`;
      } else {
        msgDiv.className = "msg left";
        msgDiv.innerHTML = `<div class="username">${data.user}</div>${data.text}`;
      }

      chat.appendChild(msgDiv);
      chat.scrollTop = chat.scrollHeight;
    });
  }
</script>

</body>
</html>
